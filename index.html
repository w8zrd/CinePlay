<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CinePlay — Watch Free Movies &amp; TV Shows Online</title>
  <meta name="description" content="Watch free movies and TV shows online on CinePlay. Stream thousands of popular, top-rated and upcoming titles instantly — no sign-up needed."/>
  <meta name="robots" content="index,follow"/>
  <meta name="theme-color" content="#0b0b0f"/>
  <link rel="canonical" href="https://www.playimdb.com/"/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="CinePlay — Watch Free Movies &amp; TV Shows Online"/>
  <meta property="og:description" content="Stream thousands of movies and TV shows instantly for free."/>
  <meta property="og:image" content="https://w8zrd.github.io/CinePlay/og-image.jpg"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://w8zrd.github.io/CinePlay/og-image.jpg"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <meta name="msapplication-TileColor" content="#0b0b0f"/>
  <link rel="manifest" href="site.webmanifest"/>
  <link rel="preconnect" href="https://api.themoviedb.org"/>
  <link rel="preconnect" href="https://image.tmdb.org"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ FLOATING PILL NAV — TOP ══ -->
<div id="pill-nav">
  <!-- Logo -->
  <button id="logo-btn" class="logo">Cine<span>Play</span></button>
  <!-- divider -->
  <div class="pd"></div>
  <!-- Movies / TV -->
  <div id="mode-wrap">
    <button class="mode-btn active" data-mode="movie">Movies</button>
    <button class="mode-btn" data-mode="tv">TV</button>
  </div>
  <!-- divider -->
  <div class="pd"></div>
  <!-- Tabs — scrollable -->
  <div id="tabs-wrap">
    <button class="tab-btn active" data-tab="popular">Popular</button>
    <button class="tab-btn" data-tab="trending">Trending</button>
    <button class="tab-btn" data-tab="top_rated">Top Rated</button>
    <button class="tab-btn" data-tab="upcoming">Upcoming</button>
  </div>
  <!-- divider -->
  <div class="pd"></div>
  <!-- Search + Filter -->
  <button id="search-toggle" aria-label="Search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button id="filter-btn" aria-label="Filter">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
  </button>
</div>

<!-- ══ SEARCH BAR (slides down under pill nav) ══ -->
<div id="search-bar" style="display:none">
  <form id="search-form" role="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="search" placeholder="Search movies &amp; shows…" autocomplete="off"/>
    <button type="button" id="search-close">✕</button>
  </form>
</div>

<!-- ══ HERO BANNER ══ -->
<section id="hero">
  <div id="hero-track"></div>
  <div id="hero-grad"></div>
  <div id="hero-content">
    <div id="hero-label">Trending Now</div>
    <h2 id="hero-title"></h2>
    <div id="hero-meta"></div>
    <p id="hero-overview"></p>
    <div id="hero-actions">
      <button id="hero-watch-btn">▶&nbsp; Watch Now</button>
      <button id="hero-more-btn">More Info</button>
    </div>
  </div>
  <div id="hero-dots"></div>
  <button id="hero-prev">&#8249;</button>
  <button id="hero-next">&#8250;</button>
</section>

<!-- ══ FILTER BOTTOM SHEET ══ -->
<div id="filter-overlay" style="display:none"></div>
<div id="filter-sheet" style="display:none">
  <div id="filter-handle"></div>
  <div id="filter-inner">
    <div class="fs-head">
      <span class="fs-title">Filters</span>
      <button id="filter-close">✕</button>
    </div>
    <div class="fs-sec"><div class="fs-lbl">Genre</div><div id="genre-chips" class="chips"></div></div>
    <div class="fs-sec"><div class="fs-lbl">Year</div><div id="year-chips" class="chips"></div></div>
    <div class="fs-sec"><div class="fs-lbl">Min Rating</div><div id="rating-chips" class="chips"></div></div>
    <div class="fs-foot">
      <button id="filter-clear">Clear</button>
      <button id="filter-apply">Apply Filters</button>
    </div>
  </div>
</div>

<!-- ══ RECENTLY VIEWED ══ -->
<div id="recent-section" style="display:none">
  <div class="row-hdr"><span class="row-ttl">Recently Viewed</span><button id="clear-recent">Clear</button></div>
  <div id="recent-grid" class="mini-grid"></div>
</div>

<!-- ══ MAIN ══ -->
<main id="main">
  <div class="sec-hdr">
    <span id="section-title" class="sec-title"></span>
    <span id="section-count" class="sec-count"></span>
  </div>
  <div id="spinner" class="state"><div class="loader"></div></div>
  <div id="empty-state" class="state" style="display:none"><p>No results found.</p></div>
  <div id="err-state" class="state" style="display:none"><p>Something went wrong. Try again.</p></div>
  <div id="grid"></div>
  <div id="pagination" style="display:none">
    <button class="page-btn" id="btn-prev">← Prev</button>
    <span id="page-info"></span>
    <button class="page-btn" id="btn-next">Next →</button>
  </div>
</main>

<!-- ══ MODAL ══ -->
<div id="modal-overlay" style="display:none" role="dialog" aria-modal="true">
  <div id="modal">
    <div id="modal-back-wrap">
      <img id="modal-backdrop" src="" alt=""/>
      <div id="modal-back-grad"></div>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-loading" style="display:none"><div class="loader"></div></div>
    <div id="modal-body">
      <div id="modal-head">
        <img id="modal-poster" src="" alt="" style="display:none"/>
        <div id="modal-info">
          <div id="modal-title"></div>
          <div id="modal-orig"></div>
          <div id="modal-pills"></div>
        </div>
      </div>
      <p id="modal-overview"></p>
      <div id="modal-meta"></div>
      <div id="modal-cast-wrap" style="display:none">
        <div class="meta-lbl" style="margin-bottom:8px">Cast</div>
        <div id="modal-cast"></div>
      </div>
      <div id="modal-cta"></div>
    </div>
  </div>
</div>

<!-- ══ FOOTER ══ -->
<footer id="footer">
  <div class="ft-inner">
    <div class="ft-brand">
      <div class="logo">Cine<span>Play</span></div>
      <p>Free movie &amp; TV streaming. No sign-up required.</p>
    </div>
    <div class="ft-links">
      <div class="ft-col"><h4>Browse</h4><a href="#">Popular</a><a href="#">Top Rated</a><a href="#">TV Shows</a></div>
      <div class="ft-col"><h4>Genres</h4><a href="#">Action</a><a href="#">Comedy</a><a href="#">Sci-Fi</a></div>
    </div>
  </div>
  <div class="ft-bottom">
    <span>© 2025 CinePlay</span>
    <span class="tmdb-c">Data by <span class="tmdb-b">TMDB</span></span>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
