<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CinePlay — Watch Free Movies &amp; TV Shows</title>
<meta name="description" content="Watch free movies and TV shows. Stream instantly, no sign-up needed."/>
<meta name="theme-color" content="#0a0a0f"/>
<meta property="og:title" content="CinePlay — Watch Free Movies &amp; TV Shows Online"/>
<meta property="og:description" content="Stream thousands of movies and TV shows for free."/>
<meta property="og:image" content="https://w8zrd.github.io/CinePlay/og-image.jpg"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://w8zrd.github.io/CinePlay/og-image.jpg"/>
<link rel="icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="manifest" href="site.webmanifest"/>
<link rel="preconnect" href="https://api.themoviedb.org"/>
<link rel="preconnect" href="https://image.tmdb.org"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="pill-nav">
  <button class="mode-btn active" data-mode="movie" aria-label="Movies" title="Movies">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
  </button>
  <button class="mode-btn" data-mode="tv" aria-label="TV Shows" title="TV Shows">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
  </button>
  <div class="pd"></div>
  <button class="tab-btn active" data-tab="popular" aria-label="Popular" title="Popular">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 6-8 7-8 13a8 8 0 0 0 16 0c0-6-8-7-8-13z"/><path d="M12 12c0 3-3 3.5-3 6a3 3 0 0 0 6 0c0-2.5-3-3-3-6z"/></svg>
  </button>
  <button class="tab-btn" data-tab="trending" aria-label="Trending" title="Trending">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </button>
  <button class="tab-btn" data-tab="top_rated" aria-label="Top Rated" title="Top Rated">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  </button>
  <button class="tab-btn" data-tab="upcoming" aria-label="Upcoming" title="Upcoming">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </button>
  <div class="pd"></div>
  <button id="search-toggle" aria-label="Search" title="Search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button id="filter-btn" aria-label="Filter" title="Filter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
  </button>
</div>

<div id="search-bar" style="display:none">
  <form id="search-form" role="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="search" placeholder="Search movies and shows…" autocomplete="off"/>
    <button type="button" id="search-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </form>
</div>

<div id="filter-overlay" style="display:none"></div>
<div id="filter-sheet" style="display:none">
  <div id="filter-handle"></div>
  <div id="filter-inner">
    <div class="fs-head">
      <span class="fs-title">Filters</span>
      <button id="filter-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="fs-sec"><div class="fs-lbl">Genre</div><div id="genre-chips" class="chips"></div></div>
    <div class="fs-sec"><div class="fs-lbl">Release Year</div><div id="year-chips" class="chips"></div></div>
    <div class="fs-sec"><div class="fs-lbl">Minimum Rating</div><div id="rating-chips" class="chips"></div></div>
    <div class="fs-foot">
      <button id="filter-clear">Clear All</button>
      <button id="filter-apply">Apply</button>
    </div>
  </div>
</div>

<div id="recent-section" style="display:none">
  <div class="row-hdr">
    <span class="row-ttl">Continue Watching</span>
    <button id="clear-recent">Clear</button>
  </div>
  <div id="recent-grid" class="mini-grid"></div>
</div>

<main id="main">
  <div class="sec-hdr">
    <span id="section-title" class="sec-title"></span>
    <span id="section-count" class="sec-count"></span>
  </div>
  <div id="spinner" class="state"><div class="loader"></div></div>
  <div id="empty-state" class="state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <p>No results found</p>
  </div>
  <div id="err-state" class="state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>Something went wrong</p>
    <button id="retry-btn">Try Again</button>
  </div>
  <div id="grid"></div>
  <div id="pagination" style="display:none">
    <button class="page-btn" id="btn-prev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="page-info"></span>
    <button class="page-btn" id="btn-next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</main>

<div id="modal-overlay" style="display:none" role="dialog" aria-modal="true">
  <div id="modal">
    <div id="modal-back-wrap">
      <img id="modal-backdrop" src="" alt=""/>
      <div id="modal-back-grad"></div>
      <button id="modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modal-loading" style="display:none"><div class="loader"></div></div>
    <div id="modal-body">
      <div id="modal-head">
        <img id="modal-poster" src="" alt="" style="display:none"/>
        <div id="modal-info">
          <div id="modal-title"></div>
          <div id="modal-orig"></div>
          <div id="modal-pills"></div>
        </div>
      </div>
      <p id="modal-overview"></p>
      <div id="modal-meta"></div>
      <div id="modal-cast-wrap" style="display:none">
        <div class="meta-lbl">Cast</div>
        <div id="modal-cast"></div>
      </div>
      <div id="modal-cta"></div>
    </div>
  </div>
</div>

<footer id="footer">
  <div class="ft-top">
    <div class="ft-brand">
      <span class="logo">Cine<em>Play</em></span>
      <p>Free streaming. No account needed.</p>
    </div>
    <div class="ft-links">
      <div class="ft-col">
        <h4>Browse</h4>
        <a href="#">Popular</a>
        <a href="#">Top Rated</a>
        <a href="#">Trending</a>
        <a href="#">TV Shows</a>
      </div>
      <div class="ft-col">
        <h4>Genres</h4>
        <a href="#">Action</a>
        <a href="#">Comedy</a>
        <a href="#">Horror</a>
        <a href="#">Sci-Fi</a>
      </div>
    </div>
  </div>
  <div class="ft-bottom">
    <span>© 2025 CinePlay</span>
    <span class="tmdb-c">Powered by <span class="tmdb-b">TMDB</span></span>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
